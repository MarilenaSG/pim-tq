<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--tq-bg);font-family:var(--tq-font-body);color:var(--tq-fg)}
  .wrap{padding:20px;display:flex;gap:20px;align-items:stretch}
  .wrap.cols3{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .swatch{border-radius:10px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:120px;box-shadow:var(--tq-shadow-xs);position:relative}
  .swatch .name{font-weight:700;font-size:14px;letter-spacing:.04em}
  .swatch .hex{font-size:11px;opacity:.8;letter-spacing:.06em;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .swatch .pantone{font-size:10px;opacity:.7;margin-top:2px}
</style></head><body>
<div class="wrap cols3">
  <div class="swatch" style="background:#00557f;color:#e8e3df">
    <div><div class="name">Snorkel</div><div class="pantone">Pantone 19-4049 TCX</div></div>
    <div class="hex">#00557F</div>
  </div>
  <div class="swatch" style="background:#0099f2;color:#fff">
    <div><div class="name">Sky</div><div class="pantone">Pantone 2193 C</div></div>
    <div class="hex">#0099F2</div>
  </div>
  <div class="swatch" style="background:#e8e3df;color:#00557f;box-shadow:inset 0 0 0 1px rgba(0,85,127,.15)">
    <div><div class="name">Alyssum</div><div class="pantone">Pantone 11-1001 TCX</div></div>
    <div class="hex">#E8E3DF</div>
  </div>
  <div class="swatch" style="background:#c8a164;color:#fff">
    <div><div class="name">Gold</div><div class="pantone">Pantone 7562 C</div></div>
    <div class="hex">#C8A164</div>
  </div>
</div>
</body></html>
