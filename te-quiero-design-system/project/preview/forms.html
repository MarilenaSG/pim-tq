<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--tq-bg);padding:24px;font-family:var(--tq-font-body);color:var(--tq-snorkel)}
.field{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;color:#00557f}
input,select{width:100%;font-family:var(--tq-font-body);font-size:15px;padding:12px 14px;border-radius:8px;border:1px solid rgba(0,85,127,.25);background:#fff;color:#00557f;outline:none;transition:.2s;box-sizing:border-box}
input:focus,select:focus{border-color:#0099f2;box-shadow:0 0 0 2px rgba(0,153,242,.25)}
.chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.02em;margin-right:6px}
.chip.sky{background:#0099f2;color:#fff}
.chip.cream{background:#fff;color:#00557f;box-shadow:inset 0 0 0 1px rgba(0,85,127,.2)}
.chip.gold{background:#c8a164;color:#fff}
</style></head><body>
<div class="field"><label>Email</label><input placeholder="tu@email.com" value="alba@example.com"></div>
<div class="field"><label>Talla del anillo</label><select><option>15 · 55 mm</option></select></div>
<div style="margin-top:8px">
  <span class="chip sky">18k · Oro amarillo</span>
  <span class="chip cream">Plata 925</span>
  <span class="chip gold">Edición especial</span>
</div>
</body></html>
