<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--tq-bg);padding:20px;font-family:var(--tq-font-body)}
.row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-start}
.box{padding:20px;border-radius:14px;flex:1;min-width:180px}
.b-xs{box-shadow:0 1px 2px rgba(0,32,60,.06);background:#fff}
.b-sm{box-shadow:0 2px 6px rgba(0,32,60,.08);background:#fff}
.b-md{box-shadow:0 8px 20px rgba(0,32,60,.10);background:#fff}
.b-lg{box-shadow:0 20px 40px rgba(0,32,60,.14);background:#fff}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#0099f2;font-weight:700;margin-bottom:6px}
.val{font-family:var(--tq-font-display);color:#00557f;font-size:18px;font-weight:700}
</style></head><body>
<div class="row">
  <div class="box b-xs"><div class="lbl">xs</div><div class="val">inputs</div></div>
  <div class="box b-sm"><div class="lbl">sm</div><div class="val">card</div></div>
  <div class="box b-md"><div class="lbl">md</div><div class="val">hover</div></div>
  <div class="box b-lg"><div class="lbl">lg</div><div class="val">modal</div></div>
</div>
</body></html>
