<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#e8e3df;font-family:var(--tq-font-body)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .swatch{border-radius:8px;padding:10px 12px;min-height:70px;display:flex;flex-direction:column;justify-content:space-between}
  .n{font-weight:600;font-size:12px}
  .h{font-size:10px;opacity:.75;letter-spacing:.06em;font-variant-numeric:tabular-nums;text-transform:uppercase}
</style></head><body>
<div class="wrap">
  <div class="swatch" style="background:#ffffff;color:#1d1d1b;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)"><div class="n">White</div><div class="h">#FFFFFF</div></div>
  <div class="swatch" style="background:#f4f1ee;color:#1d1d1b"><div class="n">Cream alt</div><div class="h">#F4F1EE</div></div>
  <div class="swatch" style="background:#e8e3df;color:#1d1d1b;box-shadow:inset 0 0 0 1px rgba(0,85,127,.15)"><div class="n">Alyssum</div><div class="h">#E8E3DF</div></div>
  <div class="swatch" style="background:#c6c6c6;color:#1d1d1b"><div class="n">Gray 300</div><div class="h">#C6C6C6</div></div>
  <div class="swatch" style="background:#b2b2b2;color:#fff"><div class="n">Gray 400</div><div class="h">#B2B2B2</div></div>
  <div class="swatch" style="background:#1d1d1b;color:#e8e3df"><div class="n">Ink</div><div class="h">#1D1D1B</div></div>
</div>
</body></html>
