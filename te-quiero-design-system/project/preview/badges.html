<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--tq-bg);padding:24px;font-family:var(--tq-font-body);color:var(--tq-snorkel)}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:0 8px 8px 0;line-height:1}
.b-new{background:#0099f2;color:#fff}
.b-sale{background:#c8a164;color:#fff}
.b-stock{background:transparent;color:#00557f;box-shadow:inset 0 0 0 1px rgba(0,85,127,.4)}
.b-oro{background:#00557f;color:#e8e3df}
.b-hand{background:#e8e3df;color:#00557f;box-shadow:inset 0 0 0 1px rgba(0,85,127,.2)}
.row{margin-bottom:10px}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#0099f2;font-weight:700;margin-bottom:6px}
</style></head><body>
<div class="row"><div class="lbl">Product status</div>
<span class="badge b-new">Nuevo</span>
<span class="badge b-sale">–20%</span>
<span class="badge b-stock">Solo 2</span>
</div>
<div class="row"><div class="lbl">Material / origin</div>
<span class="badge b-oro">Oro 18k</span>
<span class="badge b-hand">Hecho a mano</span>
</div>
</body></html>
