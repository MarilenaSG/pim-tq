<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--tq-bg);padding:20px;font-family:var(--tq-font-body)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 6px rgba(0,32,60,.08)}
.img{aspect-ratio:1;background:#f4f1ee;display:grid;place-items:center;color:#00557f}
.img svg{width:40%;opacity:.35}
.meta{padding:12px 14px}
.cat{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#0099f2;font-weight:700}
.name{font-size:14px;font-weight:500;color:#00557f;margin:4px 0 6px}
.price{font-size:15px;font-weight:600;color:#00557f;font-variant-numeric:tabular-nums}
.old{color:#b2b2b2;text-decoration:line-through;margin-left:6px;font-weight:400;font-size:13px}
</style></head><body>
<div class="grid">
  <div class="card"><div class="img"><img src="../assets/icon_navy.png" style="width:40%;opacity:.45"></div><div class="meta"><div class="cat">Anillos</div><div class="name">Aro trenzado, oro 18k</div><div class="price">349,00 €</div></div></div>
  <div class="card"><div class="img"><img src="../assets/icon_navy.png" style="width:40%;opacity:.45"></div><div class="meta"><div class="cat">Pendientes</div><div class="name">Aros pequeños, plata</div><div class="price">59,00 € <span class="old">79,00 €</span></div></div></div>
  <div class="card"><div class="img"><img src="../assets/icon_navy.png" style="width:40%;opacity:.45"></div><div class="meta"><div class="cat">Colgantes</div><div class="name">Corazón infinito, oro</div><div class="price">219,00 €</div></div></div>
</div>
</body></html>
