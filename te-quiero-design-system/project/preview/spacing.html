<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--tq-bg);padding:20px;font-family:var(--tq-font-body);color:var(--tq-snorkel)}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:#0099f2;border-radius:3px}
.lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#00557f;font-weight:700;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="width:4px;height:4px"></div><div class="lbl">1 · 4</div></div>
  <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="lbl">2 · 8</div></div>
  <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="lbl">3 · 12</div></div>
  <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="lbl">4 · 16</div></div>
  <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="lbl">5 · 24</div></div>
  <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="lbl">6 · 32</div></div>
  <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="lbl">7 · 48</div></div>
  <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="lbl">8 · 64</div></div>
</div>
</body></html>
