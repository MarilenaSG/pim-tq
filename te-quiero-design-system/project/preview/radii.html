<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--tq-bg);padding:20px;font-family:var(--tq-font-body);color:var(--tq-snorkel)}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.box{width:80px;height:60px;background:#fff;box-shadow:0 2px 6px rgba(0,32,60,.08);display:grid;place-items:center;font-size:11px;font-weight:600;letter-spacing:.06em;color:#00557f}
.r-sm{border-radius:6px}
.r-md{border-radius:10px}
.r-lg{border-radius:16px}
.r-xl{border-radius:24px}
.r-pill{border-radius:999px;width:100px}
</style></head><body>
<div class="row">
  <div class="box r-sm">6 · sm</div>
  <div class="box r-md">10 · md</div>
  <div class="box r-lg">16 · lg</div>
  <div class="box r-xl">24 · xl</div>
  <div class="box r-pill">pill</div>
</div>
</body></html>
