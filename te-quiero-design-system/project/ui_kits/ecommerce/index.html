<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Te Quiero — Joyería</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body { margin:0; background:#e8e3df; min-height:100vh; }
  button[disabled]{ opacity:.4; cursor:not-allowed }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Core.jsx"></script>
<script type="text/babel" src="Products.jsx"></script>
<script type="text/babel" src="Detail.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [view, setView] = useState('home');
  const [category, setCategory] = useState(null);
  const [product, setProduct] = useState(null);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);

  function onNav(v, cat) {
    setView(v);
    if (cat) setCategory(cat);
    window.scrollTo(0,0);
  }
  function openProduct(p) { setProduct(p); setView('pdp'); window.scrollTo(0,0); }
  function addToCart(p) { setCart([...cart, p]); setCartOpen(true); }
  function removeFromCart(i) { setCart(cart.filter((_,idx)=>idx!==i)); }

  const filteredProducts = category && category !== 'Novedades'
    ? PRODUCTS.filter(p => p.cat === category)
    : PRODUCTS;

  return (
    <div>
      <Header cart={cart} onNav={onNav} onOpenCart={() => setCartOpen(true)}/>
      {view === 'home' && <>
        <Hero onNav={onNav}/>
        <CategoryStrip onNav={onNav}/>
        <ProductGrid items={PRODUCTS.slice(0,4)} onOpen={openProduct} title="Favoritos del mes"/>
        <PatternBand/>
        <ProductGrid items={PRODUCTS.slice(4,8)} onOpen={openProduct} title="Recién llegadas"/>
        <TrustRow/>
      </>}
      {view === 'plp' && <>
        <div style={{ padding:'48px 32px 16px', maxWidth:1440, margin:'0 auto' }}>
          <div style={{ fontSize:12, letterSpacing:'.14em', textTransform:'uppercase', color:'#0099f2', fontWeight:700, marginBottom:10 }}>{category || 'Tienda'}</div>
          <h1 style={{ fontFamily:'var(--tq-font-display)', fontSize:56, fontWeight:700, color:'#00557f', margin:0 }}>{category || 'Todo'}</h1>
          <p style={{ color:'#00557f', opacity:.7, marginTop:8 }}>{filteredProducts.length} piezas</p>
        </div>
        <ProductGrid items={filteredProducts} onOpen={openProduct}/>
      </>}
      {view === 'pdp' && <PDP product={product} onBack={()=>onNav('plp', product.cat)} onAdd={addToCart}/>}
      {view === 'account' && <Account/>}
      <Footer/>
      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} items={cart} onRemove={removeFromCart}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
